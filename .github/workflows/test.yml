name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Release-mode Go build embeds web/dist via //go:embed all:dist
      # (see cli/internal/server/embed_release.go). Build the web and stage it
      # at the embed location so `go test ./...` can compile.
      - name: Build web and stage dist for Go embed
        run: |
          pnpm --filter web build
          mkdir -p cli/internal/server/dist
          cp -r web/dist/. cli/internal/server/dist/

      - run: pnpm test
