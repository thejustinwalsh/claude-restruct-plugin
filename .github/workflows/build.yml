name: Build & Package Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w -X github.com/tjw/restruct/cmd.Version=${{ github.ref_name }}" \
            -o ../plugin/bin/restruct-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: restruct-${{ matrix.suffix }}
          path: plugin/bin/restruct-${{ matrix.suffix }}

  package-plugin:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: plugin/bin/
          merge-multiple: true

      - name: Create platform launcher script
        run: |
          cat > plugin/bin/restruct << 'LAUNCHER'
          #!/bin/sh
          # Auto-detect platform and run the correct binary
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
          esac
          BINARY="$(dirname "$0")/restruct-${OS}-${ARCH}"
          if [ ! -x "$BINARY" ]; then
            echo "restruct: no binary for ${OS}-${ARCH}" >&2
            exit 1
          fi
          exec "$BINARY" "$@"
          LAUNCHER
          chmod +x plugin/bin/restruct

      - name: Package plugin
        run: |
          cd plugin
          tar czf ../restruct-plugin-${{ github.ref_name }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            restruct-plugin-*.tar.gz
          generate_release_notes: true
