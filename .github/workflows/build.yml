name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build all platform binaries (release mode)
        run: pnpm release

      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f plugin/bin/restruct-*
          git commit -m "build: release binaries for ${GITHUB_REF_NAME:-manual}" || echo "No changes to commit"
          git push

      - name: Dispatch aggregator version bump
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.AGGREGATOR_DISPATCH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Dispatching bump-plugin.yml in thejustinwalsh/claude-plugins for restruct → ${VERSION}"
          gh workflow run bump-plugin.yml \
            --repo thejustinwalsh/claude-plugins \
            -f plugin=restruct \
            -f version="${VERSION}"
